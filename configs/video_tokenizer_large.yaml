# LARGE tokenizer (tiny was 32/128/4) — same FSQ codebook (latent_dim 5, num_bins 4 = 1024) so dynamics stays compatible
batch_size_per_gpu: 12       # embed512 + ctx8: keep B*P*H under flash grid (12*256*8=24576) and within memory
gradient_accumulation_steps: 2
n_updates: 40000
learning_rate: 0.0003        # scaled down for the smaller batch (tiny used 0.001 at larger batch) to avoid divergence
log_interval: 2500
embed_dim: 512
num_heads: 8
hidden_dim: 2048
num_blocks: 8
checkpoint: null
