# Training - LARGE action model (mirrors dynamics width 512/2048)
batch_size_per_gpu: 16
gradient_accumulation_steps: 2   # effective batch = 16 x 4 GPUs x 2 = 128
n_updates: 10000
learning_rate: 0.0001
log_interval: 500

# LARGE params (tiny was 32 / 128 / 2)
embed_dim: 512
num_heads: 8
hidden_dim: 2048
num_blocks: 8

# resume from checkpoint
checkpoint: null
