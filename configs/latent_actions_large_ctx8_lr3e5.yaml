# Training - LARGE action model (mirrors dynamics width 512/2048)
batch_size_per_gpu: 8
gradient_accumulation_steps: 4   # 8x4x4 = eff 128 (ctx8 = 2x activations)
n_updates: 10000
learning_rate: 0.00003
log_interval: 500

# LARGE params (tiny was 32 / 128 / 2)
embed_dim: 512
num_heads: 8
hidden_dim: 2048
num_blocks: 8

# resume from checkpoint
checkpoint: null
